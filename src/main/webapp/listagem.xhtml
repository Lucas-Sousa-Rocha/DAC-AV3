<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui">
<h:head>
	<title>Listagem de Jogos</title>
</h:head>
<h:body>
	<h:form>

		<br />
		<br />
		<h:link value="Voltar para o menu" outcome="opcoes.xhtml"
			style="display: inline-block; text-align: center; 
                           background: #f0f0f0; padding: 10px; border-radius: 5px; 
                           color: #007ad9; text-decoration: none; 
                           border: 1px solid #007ad9; font-size: 14px;" />
		<p:dataTable value="#{jogoBean.listar()}" var="jogo">
			<p:column headerText="Data Partida">
				<h:outputText value="#{jogo.dataPartida}" />
			</p:column>
			<p:column headerText="Time 1">
				<h:outputText value="#{jogo.time1}" />
			</p:column>
			<p:column headerText="Time 2">
				<h:outputText value="#{jogo.time2}" />
			</p:column>
			<p:column headerText="Ações">
				<h:commandButton value="Editar" action="#{jogoBean.editar(jogo)}" />
				<h:commandButton value="Excluir"
					action="#{jogoBean.excluir(jogo.id)}" />
			</p:column>
		</p:dataTable>
	</h:form>
</h:body>
</html>
