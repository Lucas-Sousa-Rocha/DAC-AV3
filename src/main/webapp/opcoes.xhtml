<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Opções</title>
    <h:outputStylesheet name="styles.css" />
    <style>
        /* Estilo geral do corpo */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f7fc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        /* Estilo do painel de navegação */
        .menu-container {
            background-color: #ffffff;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            width: 320px;
            text-align: center;
            transition: transform 0.3s ease-in-out;
        }

        .menu-container:hover {
            transform: scale(1.05);
        }

        /* Estilo do título */
        h3 {
            color: #3498db;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Estilo do usuário logado */
        .user-info {
            font-size: 16px;
            color: #555;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Estilo da lista de navegação */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        ul li {
            margin: 18px 0;
            transition: transform 0.3s ease;
        }

        ul li:hover {
            transform: translateX(10px);
        }

        /* Estilo dos links */
        a {
            color: #3498db;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            display: block;
            transition: color 0.3s ease, text-decoration 0.3s ease;
        }

        a:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        /* Estilo do botão de sair */
        .logout-button {
            margin-top: 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .logout-button:hover {
            background-color: #c0392b;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .menu-container {
                width: 80%;
                padding: 25px;
            }

            h3 {
                font-size: 24px;
            }

            .user-info {
                font-size: 14px;
            }

            ul li {
                margin: 12px 0;
            }
        }
    </style>
</h:head>

<h:body>
    <div class="menu-container">
        <!-- Título do menu -->
        <h3>Menu de Navegação</h3>

        <!-- Exibir o nome do usuário logado -->
        <div class="user-info">
            <h:outputText value="Usuário Logado: #{usuarioBean.nomeUsuario}" />
        </div>

        <!-- Lista de opções -->
        <ul>
            <li><h:link value="Cadastro de Campeonato" outcome="cadastro_campeonato.xhtml" /></li>
            <li><h:link value="Cadastro de Jogo" outcome="cadastro_jogo.xhtml" /></li>
            <li><h:link value="Listagem de Jogos" outcome="listagem.xhtml" /></li>
            <li><h:link value="Filtro de Jogos" outcome="filtro.xhtml" /></li>
        </ul>

        <!-- Link de logout -->
        <h:form>
            <h:commandButton value="Sair" action="#{usuarioBean.logout()}" styleClass="logout-button" />
        </h:form>
    </div>
</h:body>

</html>
